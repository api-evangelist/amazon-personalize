naftiko: 1.0.0-alpha2
info:
  label: Amazon Personalize API Workflow
  description: Workflow capability composing Amazon Personalize APIs for developers and operators.
  tags:
  - Amazon Personalize
  - AWS
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: openapi.yml
    baseUri: https://personalize.{region}.amazonaws.com
    description: The Amazon Personalize API enables you to create, manage, and deploy personalization models. You can
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: datasets
      path: /datasets
      description: Datasets operations for Amazon Personalize API
      operations:
      - name: CreateDatasetGroup
        method: POST
        description: Amazon Personalize Create a Dataset Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-personalize-api
    description: Unified REST API for Amazon Personalize.
    resources:
    - path: /v1/resources
      name: resources
      description: Primary Amazon Personalize resources
      operations:
      - method: GET
        name: list-resources
        description: List Amazon Personalize resources
        call: openapi.yml.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-personalize-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Personalize operations.
    tools:
    - name: list-openapi.yml
      description: List and manage openapi.yml resources
      hints:
        readOnly: true
        openWorld: true
      call: openapi.yml.list
      outputParameters:
      - type: object
        mapping: $.
