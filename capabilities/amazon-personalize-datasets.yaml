naftiko: 1.0.0-alpha2
info:
  label: Amazon Personalize API — Datasets
  description: 'Amazon Personalize API — Datasets. 1 operations. Lead operation: Amazon Personalize Create a Dataset Group.
    Self-contained Naftiko capability covering one Amazon Personalize business surface.'
  tags:
  - Amazon Personalize
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_PERSONALIZE_API_KEY: AMAZON_PERSONALIZE_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-personalize-datasets
    baseUri: https://personalize.{region}.amazonaws.com
    description: Amazon Personalize API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: createdatasetgroup
        method: POST
        description: Amazon Personalize Create a Dataset Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_PERSONALIZE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-personalize-datasets-rest
    port: 8080
    description: REST adapter for Amazon Personalize API — Datasets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: createdatasetgroup
        description: Amazon Personalize Create a Dataset Group
        call: amazon-personalize-datasets.createdatasetgroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-personalize-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Personalize API — Datasets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-personalize-create-dataset-group
      description: Amazon Personalize Create a Dataset Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-personalize-datasets.createdatasetgroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
